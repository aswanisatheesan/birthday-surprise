<!DOCTYPE html>
<html>
<head>
  <title>Birthday Surprise</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    img {
      width: 220px;
      border-radius: 15px;
      border: 4px solid #ff6f91;
    }

    h1 {
      color: #ff4081;
    }

    p {
      font-size: 18px;
      color: #444;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #ff4081;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    #surprise {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      color: #ff4081;
      font-weight: bold;
    }

    .hearts {
      position: fixed;
      top: 0;
      width: 100%;
      font-size: 24px;
      animation: floatHearts 6s linear infinite;
      pointer-events: none;
    }

    @keyframes floatHearts {
      0% {transform: translateY(100vh); opacity: 0;}
      50% {opacity: 1;}
      100% {transform: translateY(-10vh); opacity: 0;}
    }

    #confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

  </style>
</head>

<body>

  <!-- EFFECTS -->
  <div class="hearts">❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ </div>
  <canvas id="confetti"></canvas>

  <!-- CONTENT -->
  <div class="container">

    <img src="archana.jpg" alt="Archana">

    <h1> Happy Birthday paaru🫶</h1>

    <p>
      You will always be my little sister, no matter what🙇‍♀️
      I hope this bond lasts forever<br><br>
      Wishing you happiness, success and endless smiles ✨
    </p>

    <button onclick="showMessage()">🎁 Click for Surprise</button>

    <div id="surprise">
      You are truly special❤️  
      Have the best birthday ever! ummahhh😘
    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    function showMessage() {
      document.getElementById("surprise").style.display = "block";
    }

    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];

    for (let i = 0; i < 120; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 6 + 2,
        speed: Math.random() * 3 + 1
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ff4081";

      pieces.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();

        p.y += p.speed;

        if (p.y > canvas.height) {
          p.y = 0;
          p.x = Math.random() * canvas.width;
        }
      });
    }

    setInterval(draw, 30);
  </script>

</body>
</html>
